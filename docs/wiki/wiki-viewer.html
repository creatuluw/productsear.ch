# Adopt agentos-sdk.dev visual design system

## Context
productsear.ch needs a visual identity. The user chose to restyle the app to match https://agentos-sdk.dev/ exactly. The assistant extracted the full design system by pulling the live site's HTML/CSS, capturing exact RGB/HSL color tokens, typography, signature elements, and structural patterns.

## Choice
Adopt the agentos-sdk.dev design language wholesale: a **warm light paper theme** (not dark), chrome-gradient borders, cream cards, orange primary, Manrope + JetBrains Mono typography, and SVG paper grain texture.

## Key tokens (exact values)
- **paper (bg):** \`#EFEFEF\` \`rgb(239 239 239)\` + SVG \`feTurbulence\` grain (opacity 0.045)
- **cream:** \`#F4F1E7\` \`rgb(244 241 231)\` — card fills, subtle surfaces
- **ink (text):** \`#1B1916\` \`rgb(27 25 22)\` — warm near-black for all text
- **primary:** \`hsl(18 100% 50%)\` \`#FF6A00\` — bright orange CTA
- **olive:** \`#5C6B4F\`, **sage:** \`#93A286\`, **gold/tan:** \`#D4B483\`
- **muted:** \`#8A8478\` / \`#56524A\`
- **borders:** hairline \`#1B19161a\` (ink @ 10%)

## Typography
- Sans: **Manrope** (400/500/600/700, base 400)
- Mono: **JetBrains Mono** (400/500/600)
- Accent/handwritten: **Gloria Hallelujah**
- Headlines use \`font-medium\` (NOT bold), tight negative tracking (\`-0.02em\` h1, \`-0.015em\` h2)
- Body: \`line-height: 1.5\`, antialiased

## Signature elements
1. **Chrome gradient border** (the trademark): animated conic-gradient silver via \`:before\` (\`mask-composite: exclude\`) + soft glow \`:after\`; hover advances \`--chrome-hover-offset: 60deg\` over 0.7s. Two variants: \`.btn-chrome\` (filled silver) and \`.btn-chrome-outline\`.
2. **Glass:** \`#ffffff05\` bg, \`#ffffff1a\` border, \`backdrop-filter: blur(12px)\`
3. **Primary button:** \`bg-primary\` orange, white text

## Structure
- Radius \`0.5rem\`; header height \`3.5rem\`
- Sticky nav: \`sticky top-0 z-10 bg-paper/85 backdrop-blur-md border-b\`
- Cards: \`rounded-lg border border-cream/10 bg-cream/[0.03]\`
- Code blocks: dark Shiki theme inside light paper cards

Matching an existing polished site gives an instant, coherent, professional design without designing from scratch. The warm-paper aesthetic is distinctive (vs. generic dark/neutral SaaS) and the chrome-gradient border is a memorable signature element.

The site's \`:root\` contains leftover shadcn dark HSL vars (\`--background: 240 10% 3.9%\`) — these are **unused**. Do NOT copy them. The site is light; those vars are dead defaults.

- Build an original design system — rejected: slower, needs iteration to reach this polish.
- Match a different reference site — rejected: user specified agentos-sdk.dev explicitly.

- \`app.css @theme\` tokens change from greyscale to paper/cream/ink/primary/olive/sage.
- Google Fonts load changes to Manrope + JetBrains Mono.

# Adopt cross-encoder reranking (Voyage rerank-2.5-lite) on top of RRF hybrid search

## Context

Hybrid search already fused pgvector cosine similarity + Postgres \`ts_rank\` FTS via Reciprocal Rank Fusion (see [[hybrid-search-via-reciprocal-rank-fusion]]). RRF does good first-pass retrieval but still surfaces keyword-match noise over genuinely-on-topic docs (e.g. a LinkedIn post / tweet ranked at #3/#5 for "tools to build a SaaS quickly" because of keyword overlap, not semantic relevance).

## Choice

Add a **cross-encoder reranking stage**: after RRF retrieves a pool of candidate docs, a Voyage \`rerank-2.5-lite\` cross-encoder re-scores them and we return the top \`limit\`. Implemented in \`src/lib/server/rerank.ts\`, wired into \`src/lib/server/search.ts\` so both [[api-search-endpoint]] and [[api-ask-endpoint]] benefit.

## Alternatives considered

- **Larger RRF \`k\` / different fusion weights** — tuning fusion alone still ranks on lexical+vector overlap, doesn't model query-doc interaction. Cheap but doesn't fix the semantic-relevance gap.
- **Bigger embedding model** — already moved to Voyage voyage-4-large 1024-dim. Bi-encoder embeddings cap out on this axis; a cross-encoder is the complementary step.
- **LLM-based reranking** — slower and costlier per query than a dedicated rerank API.

## Rationale

A cross-encoder scores the query and each candidate *together*, so it captures relevance a bi-encoder can't. Verified live: for "tools to build a SaaS quickly", reranking promoted *"How I Build about 60% of My App's Codebase in a day"* to #1 — a doc RRF had ranked lower but is the most semantically on-topic — while demoting the keyword-noise hits. Exactly the behaviour a cross-encoder is supposed to deliver.

## Consequences

- **Latency**: one extra API call per query (Voyage rerank). Pool is capped at 50 candidates to bound it.
- **Resilience**: rerank is non-critical — if the Voyage rerank call fails, \`search.ts\` falls back to plain RRF order. Search degrades gracefully, never breaks.
- **Cost**: small per-query rerank call; acceptable for a search/RAG workload.
- **Content cap raised** as a follow-on: \`bookmark-text.ts\` 1500 → 6000 chars (the 1500 cap only existed for MiniLM's 512-token limit; Voyage voyage-4-large takes 32k). Re-embedded all 2,277 bookmarks.

# Embedding provider: Voyage voyage-4-large (1024-dim)

## Context
The search stack (see [hybrid-semantic-search-stack](../pages/concepts/hybrid-search-via-reciprocal-rank-fusion)) originally specified OpenAI \`text-embedding-3-small\` (1536-dim). Before this decision it had been reduced to 384-dim. We are now switching to **Voyage AI \`voyage-4-large\` at 1024 dimensions**.

## Choice
- Embedding model: **Voyage \`voyage-4-large\`**, **1024 dimensions**, cosine similarity.
- The \`bookmark_embeddings\` table is dropped and recreated at \`vector(1024)\` via \`scripts/migration-voyage-1024.sql\` (HNSW index rebuilt).
- \`src/lib/server/embeddings.ts\` rewritten to call the Voyage API, passing \`input_type=query\` at search time and \`input_type=document\` at backfill time (Voyage's recommended asymmetric encoding).
- \`scripts/embed-bookmarks.ts\` defaults to \`input_type='document'\` and model \`voyage-4-large\`.
- \`.env\` / \`.env.example\` carry the Voyage key + new model defaults.
- \`src/lib/server/db/index.ts\` Drizzle schema dims updated 384 → 1024.
- Full re-embed of all 2,270 bookmarks required after migration (table wiped).

## Alternatives considered
- **Stay on OpenAI 384-dim**: rejected — Voyage \`voyage-4-large\` benchmarks better on retrieval and the swap was always intended (the parent decision named Voyage/Cohere as swappable).
- **1536-dim OpenAI**: rejected on cost/quality tradeoff vs Voyage.

## Rationale
Voyage \`voyage-4-large\` gives stronger retrieval quality at 1024-dim; the embed layer was already isolated behind a thin seam (\`embeddings.ts\` + the backfill script), so the swap touches no search/RAG logic. Asymmetric \`input_type\` (query vs document) is Voyage's recommended usage and improves ranking.

# Hybrid semantic search stack: pgvector + tsvector with RRF fusion

## Context
productsear.ch needs semantic search and RAG ("ask") over ~2,270 existing bookmarks that already live in Postgres (bookmarks, content, and bookmark_analysis tables). The question was what stack to build the search/RAG layer on.

## Choice
- **SvelteKit 2 + adapter-node + TypeScript strict + Tailwind 4** as the app/runtime shell.
- **Drizzle ORM** for read models (bookmarks / content / analysis).
- **pgvector + native Postgres \`tsvector\`** in the existing Postgres (Railway) — no separate vector DB, no ParadeDB extension. pgvector's HNSW index for cosine similarity; GIN index for full-text.
- **Hybrid ranking via Reciprocal Rank Fusion (RRF)** — one SQL query fuses cosine rank + \`ts_rank\` rank without score normalization.
- **One searchable text blob** (title + tags + excerpt + \`bookmark_analysis.purpose/how_to_use/relevance\` + content snippet) feeds *both* the embedding and the tsvector, so semantic and keyword signals cover identical ground.
- **OpenAI \`text-embedding-3-small\` (1536-dim)** for embeddings, **\`gpt-4o-mini\`** for RAG, streamed via the **Vercel \`ai\` SDK**.

## Alternatives considered
- **Separate vector DB** (Pinecone/Qdrant/Weaviate): rejected — extra infra for 2.3k rows where an in-PG HNSW scan is sub-ms. Postgres already holds the source data.
- **ParadeDB**: rejected as unnecessary given pgvector + native \`tsvector\` already cover the hybrid need.
- **Larger embedding model / different provider**: \`text-embedding-3-small\` chosen for cost (~$0.02 to backfill all rows); provider is swappable (Ollama local, Voyage/Cohere) since it's isolated behind the embed script + API.

## Rationale
Keep everything in the Postgres you already have; fuse signals in SQL rather than in app code; isolate the LLM/embedding provider behind a thin seam so it can be swapped without touching search/RAG logic. At 2.3k rows exact/HNSW scan is sub-ms, so a dedicated vector store is pure overhead.

## Consequences
- Two API routes: \`/api/search\` (hybrid RRF) and \`/api/ask\` (streaming RAG with citations).
- \`bookmark_embeddings\` table (pgvector) + HNSW + GIN indexes required (migration shipped).
- A resumable backfill script (\`scripts/embed-bookmarks.ts\`) must run once (~1 min, ~$0.02) before live search works.
- Search/ask return a clear "OPENAI_API_KEY not set" error until a real key is configured — the wiring is verified end-to-end but live run is gated on a key.

## Source
- \`research_semantic_search/research_report.md\` — research backing the choice
- \`src/lib/server/search.ts\` — hybrid RRF query
- \`src/lib/server/rag.ts\` — streaming RAG
- \`scripts/embed-bookmarks.ts\` — resumable backfill
- \`scripts/migration.sql\` — pgvector + indexes

# adapter-node requires ORIGIN env var for CSRF protection

When deploying SvelteKit with \`@sveltejs/adapter-node\`, requests with a mismatched \`Host\`/\`Origin\` header are rejected unless the \`ORIGIN\` environment variable is set to the app's public URL (e.g. \`https://<app>.up.railway.app\`).

**Symptom**: \`403 Cross-site POST form submissions forbidden\` (or similar) on form actions and POST endpoints in production.

**Fix**: Set \`ORIGIN\` on the host (Railway dashboard env vars). \`PORT\` is provided automatically by Railway — do not hardcode it.

This bit us on Railway after the first successful deploy of the productsear.ch SvelteKit app. The build/start phases worked, but POST requests failed until \`ORIGIN\` was configured.

# agentos-sdk.dev is a light warm-paper theme, not dark

When extracting the design system from https://agentos-sdk.dev/, the \`:root\` CSS contains leftover shadcn dark-mode HSL variables (e.g. \`--background: 240 10% 3.9%\`). These are **unused dead defaults** — the site is actually a **light** warm-paper theme (\`#EFEFEF\` background + SVG grain).

# $env/dynamic/private breaks under plain tsx — use process.env in shared server modules

SvelteKit's \`$env/dynamic/private\` is a **virtual module resolved only by the SvelteKit Vite pipeline**. Importing it from a standalone script run via \`tsx\` (e.g. a backfill script) fails to resolve.

# GitHub requires \`workflow\` scope on the token to push commits touching \`.github/workflows/\`

A token with only \`repo\` (and \`gist\`, \`read:org\`) scopes cannot push a commit that modifies any file under \`.github/workflows/\`. GitHub rejects the push with a "refusing to allow ... to create or update workflow" error. The push token must have the **\`workflow\`** scope granted.

This applies to *any* commit touching a workflow file — not just commits that create workflows. A commit that mixes workflow-file changes with unrelated code will be rejected wholesale unless the token has the scope.

## Workarounds

- **Add the scope once**: \`gh auth refresh -h github.com -s workflow\` opens a browser to grant \`workflow\` to the current \`gh\` token.
- **Split the commit**: ship the non-workflow changes first, then add the scope and push the workflow file separately.
- **Create the file via the GitHub web UI** (e.g. \`…/new/main/.github/workflows\`) which bypasses the token-scope check entirely.

## Evidence

In this repo, the \`creatuluw\` token (scopes: \`gist, read:org, repo\`) had its push rejected because the commit touched \`.github/workflows/embed-new-bookmarks.yml\`. The \`hoipippeloi\` token has the scope but lacks write access to the repo. Splitting the commit let everything else land on \`main\`; the workflow file needed the scope added (or the UI route).

# Postgres FTS "word too long" NOTICE for >2047-char tokens is harmless

When populating a \`tsvector\` / \`search_tsv\` column, Postgres may emit a NOTICE like:

for any token longer than 2047 characters. This is **not an error** — it's an informational NOTICE. The index/row is still created; that one oversized token is just skipped.

We hit this during the 6000-char-content re-embed backfill of 2,277 bookmarks and the run completed \`2277/2277\` cleanly. Don't treat the NOTICE line as a failure when scanning script logs — check the final count.

# Railpack (Railway build driver) requires a start command

Railpack is Railway's default build driver (v0.30.0 at time of writing). It infers the start command for a Node app by checking, in order:

1. A \`"start"\` script in \`package.json\`
2. A \`"main"\` field in \`package.json\` pointing to an entry file
3. An \`index.js\` or \`index.ts\` in the project root

If none are present the build fails with \`✖ No start command detected\`. Having only a \`"build"\` script is not enough.

**For SvelteKit + \`@sveltejs/adapter-node\`**: the build emits \`build/index.js\`, so add this script to \`package.json\`:

\`\`\`json
"scripts": {
  "start": "node build"
}
\`\`\`

Static sites can instead set \`RAILPACK_SPA_OUTPUT_DIR\` to the built-files directory.

The fix that unblocked the Railway deploy was simply adding the \`start\` script — Railpack then runs \`npm install\` → \`npm run build\` → \`node build\`.

# SvelteKit dev server does not populate process.env from .env — load dotenv yourself

SvelteKit's Vite dev server does **not** populate \`process.env\` from your \`.env\` file. That is what the \`$env/*\` virtual modules are for. If your server modules (\`src/lib/server/*\`) read \`process.env.DATABASE_URL\` directly, the value is **undefined under \`vite dev\`**, even though the file exists and \`.env.example\` documents it.

This is the converse of [[env-dynamic-private-breaks-under-plain-tsx-use-process-env-i]] — you can't use \`$env/dynamic/private\` (breaks under plain \`tsx\` scripts) *or* bare \`process.env\` (empty under Vite dev) without help.

## Symptom
With \`postgres()\` and no connection string passed, the driver falls back to \`localhost:5432\`. \`localhost\` resolves to both \`127.0.0.1\` and \`::1\`; with nothing listening, both are refused. Node surfaces this as:

\`\`\`
AggregateError [ECONNREFUSED]
    at internalConnectMultiple (node:net:...)
    at afterConnectMultiple (node:net:...)
\`\`\`

That \`AggregateError\` + \`internalConnectMultiple\`/\`afterConnectMultiple\` signature is the tell: it connected to **localhost**, i.e. the env var was undefined — not a transient network blip or a wrong Railway proxy.

## Why standalone scripts worked
\`npx tsx scripts/embed-bookmarks.ts\` worked because the script calls \`dotenv.config()\` itself. A one-off \`node -e "...postgres()..."\` probe worked for the same reason. The dev server path has no such call.

## Fix
Add one line to the shared db module — \`dotenv/config\` only **adds** missing vars, it never overrides ones already set, so scripts/CI/\`adapter-node\` runtime (where env is injected) are unaffected:

\`\`\`ts
// src/lib/server/db/index.ts
import 'dotenv/config'
import { drizzle } from 'drizzle-orm/postgres-js'
// ...
\`\`\`

## Source
- \`src/lib/server/db/index.ts\` — \`import 'dotenv/config'\` added at top
`,

# Voyage free-tier rate limit (3 RPM / 10K TPM) blocks bulk backfill without a payment method

## Gotcha
A Voyage AI account **with no payment method on file** is capped at **3 requests/min and 10K tokens/min**, even though the advertised 200M free-token credit still applies. This is well below what a one-shot corpus backfill needs (~2,270 bookmarks ≈ 700K tokens).

## Symptom
\`scripts/embed-bookmarks.ts\` embedded one batch, then Voyage returned **HTTP 429**. With a 10K TPM ceiling, a full re-embed would take ~70 min of sustained throttling.

## Fix options
1. **Add a payment method** at https://dashboard.voyageai.com/billing — the 200M free tokens still apply so you are not charged, but billing unlocks standard rate limits and the backfill finishes in ~1 min. (Recommended.)
2. **Self-throttle the script** to ≤10K TPM (~25 docs/min) with 429 backoff + resume. Slower but free without billing.

## Takeaway
Before running any bulk Voyage embed job, check the account's billing tab. Free token credit ≠ usable throughput until a payment method is attached. Always make the embed client robust to 429s (the rewritten \`src/lib/server/embeddings.ts\` now backoffs on 429).

# Overview

**productsear.ch** is a semantic bookmark search application. Users search a corpus of bookmarks using natural language; the app returns relevant bookmarks via **hybrid search** (pgvector cosine similarity over embeddings fused with PostgreSQL full-text \`ts_rank\` via [reciprocal rank fusion](./pages/concepts/hybrid-search-via-reciprocal-rank-fusion.md)), plus an **Ask** mode that streams a RAG-style answer grounded in the top results.

## Tech stack

- **Frontend**: SvelteKit 2 + Svelte 5, Tailwind CSS v4. Visual design follows the agentos-sdk.dev look (light warm paper theme) — see [the ADR](./decisions/adopt-agentos-sdk-dev-visual-design-system.md).
- **Database**: PostgreSQL on Railway (\`te9_dev\` schema), with the \`pgvector\` extension. Embeddings are 1024-dimensional (Voyage \`voyage-4-large\`) after a migration from the original 384-dim OpenAI/HuggingFace model — see the [embedding-provider ADR](./decisions/embedding-provider-voyage-voyage-4-large-1024-dim.md).
- **Embeddings & reranking**: Voyage AI (\`VOYAGE_API_KEY\`). \`src/lib/server/embeddings.ts\` (embeddings) and \`src/lib/server/rerank.ts\` (cross-encoder rerank with \`rerank-2.5-lite\`) — both raw \`fetch\`, no SDK. Reranking was added on top of RRF — see the [reranking ADR](./decisions/adopt-cross-encoder-reranking-voyage-rerank-2-5-lite-on-top-.md).
- **Chat/RAG**: Vercel AI SDK v4 \`streamText\`. Chat provider is DeepSeek by default (OpenAI-compatible); \`OPENAI_API_KEY\` + \`CHAT_BASE_URL\` switch to OpenAI/OpenRouter.
- **Deployment**: Railway via \`@sveltejs/adapter-node\`. \`npm start\` runs \`node build\`.

## Project layout

Three top-level dirs hold runtime/scratch state: \`.pi/\` (coding-agent session state), \`.work/\` (task-tracker scratch), and \`.agents/\` (skill definitions). \`docs/\` holds the OKF knowledge wiki (\`docs/wiki/\`) and \`docs/research_semantic_search/research_report.md\`. The application source lives in \`src/\`: \`src/lib/server/\` for the search/RAG pipeline, \`src/routes/\` for SvelteKit pages and API routes. \`scripts/\` holds the embedding backfill and SQL migrations. \`.github/workflows/embed-new-bookmarks.yml\` runs a daily cron to embed newly added bookmarks. See [architecture/file-tree](./architecture/file-tree.md) for the complete file map.

## Knowledge wiki

\`docs/wiki/\` is an [OKF](https://github.com/earendil-works/okf) bundle: \`index.md\` (navigation), this overview, \`glossary.md\`, \`architecture/file-tree.md\`, plus typed folders — \`decisions/\` (ADRs), \`rules/\`, \`learnings/\`, \`preferences/\`, and \`pages/\` (split into \`concepts/\`, \`entities/\`, \`artifacts/\`). Each typed folder has its own \`index.md\`.

# Hybrid search via Reciprocal Rank Fusion

## What is it?
Hybrid search combines semantic (vector cosine similarity) and keyword (\`tsvector\` full-text) ranking into one result list. **Reciprocal Rank Fusion (RRF)** fuses the two ranked lists by scoring each result as \`Σ 1/(k + rank_i)\` across both rankers — no score normalization needed, just ranks.

## Why does it matter?
Semantic and keyword signals catch different queries. Normalizing cosine distance and \`ts_rank\` into a comparable scale is fiddly and provider-dependent. RRF sidesteps normalization entirely: it only cares about each result's *rank* in each list, so it fuses cleanly in a single SQL query.

## Key rules / properties
- Only ranks matter, not raw scores — robust to different score distributions.
- \`k\` (constant, typically 60) dampens the contribution of top ranks; tunable but rarely needs tuning.
- Both rankers must cover comparable content ground — here both operate on one shared searchable text blob.

## Relationships
- [hybrid-semantic-search-stack-pgvector-tsvector-with-rrf-fusi](./hybrid-semantic-search-stack-pgvector-tsvector-with-rrf-fusi.md) — the decision that chose RRF.
- [api-search-endpoint](./api-search-endpoint.md) — implements RRF over pgvector cosine + \`ts_rank\`.

## Source
- \`src/lib/server/search.ts\` — the single fused SQL query

description: Guideline

# Pool-then-rerank with graceful fallback for retrieval

## Guideline

When adding a cross-encoder (e.g. Voyage \`rerank-2.5-lite\`) on top of a cheap first-pass retriever (RRF / vector / FTS):

- **Fetch a candidate pool** larger than the final limit (we use **50 → top \`limit\`**). Reranking is wasted on docs the retriever never surfaced; give the cross-encoder enough candidates to reorder.
- **Cap the pool** to bound rerank latency/cost — 50 is our working ceiling.
- **Treat the reranker as non-critical.** Wrap it so that if the rerank API errors/times out, you fall back to first-pass order and still return results. Search degrades to RRF, never breaks.

## When it applies

Any two-stage retrieval pipeline (bi-encoder retrieve → cross-encoder rerank) in this project — currently \`src/lib/server/search.ts\`, serving [[api-search-endpoint]] and [[api-ask-endpoint]].

## Rationale

A cross-encoder only helps if it sees a real candidate set, and a pool too small starves it. But the rerank call is an external dependency; making it mandatory means one outage blanks search. The fallback keeps the read path always-available.

# Sanitize text at the embedding API boundary

## Guideline
Before sending any text to an embedding API (Voyage, OpenAI, Cohere, …), run it through a \`clean()\` step that strips **lone UTF-16 surrogates** and **C0/C1 control characters**. Apply it at the single embedding boundary (\`src/lib/server/embeddings.ts\`) and in the backfill script, not at every caller.

## When it applies
Always, when the source text is scraped/foreign (markdown, HTML, user paste). Our bookmark corpus contains scraped markdown where some rows have lone surrogates and control chars.

## Rationale
Providers reject malformed Unicode with **HTTP 400** mid-backfill, killing the whole job. The fix is one guard in the shared embed function — smaller and safer than guarding every producer. Lone surrogates are invalid UTF-8 by definition; control chars contribute nothing to embeddings.

## Implementation
In \`src/lib/server/embeddings.ts\`, \`clean(s)\` strips lone surrogates and control chars before the Voyage POST. The backfill script routes every row through \`embed()\` so it inherits the guard.

## Related
- [[embedding-provider-voyage-voyage-4-large-1024-dim]] — the migration that introduced the Voyage client and this guard.
